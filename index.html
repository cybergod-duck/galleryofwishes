<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Of Wishes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gallery Of Wishes</h1>
    </header>
    <main class="gallery">
        <!-- Special image first -->
        <img src="images/download (13).png" alt="Special Wish" class="special-image">
        <!-- Other images -->
        <script>
            const gallery = document.querySelector('.gallery');
            for (let i = 1; i <= 12; i++) {
                const img = document.createElement('img');
                img.src = `images/download (${i}).png`;
                img.alt = `Wish ${i}`;
                gallery.appendChild(img);
            }
        </script>
    </main>
</body>
</html>
